services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: sqlite:///./geo_furniture.db
      SECRET_KEY: compose-demo-secret
      H3_RESOLUTION: 7
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  frontend:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - backend
